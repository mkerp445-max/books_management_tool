<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>蔵書管理システム</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .menu-card { transition: transform 0.2s; cursor: pointer; }
        .menu-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-5">📚 蔵書管理システム</h1>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-info">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="row g-4 justify-content-center">
            <!-- 利用者管理 -->
            <div class="col-md-4">
                <a href="{{ url_for('persons') }}" class="text-decoration-none text-dark">
                    <div class="card h-100 shadow-sm menu-card">
                        <div class="card-body text-center">
                            <h2 class="display-4">👥</h2>
                            <h4 class="card-title">利用者管理</h4>
                            <p class="card-text text-muted">人の登録・一覧・削除</p>
                        </div>
                    </div>
                </a>
            </div>

            <!-- 本の登録 -->
            <div class="col-md-4">
                <a href="{{ url_for('get_book') }}" class="text-decoration-none text-dark">
                    <div class="card h-100 shadow-sm menu-card">
                        <div class="card-body text-center border-primary">
                            <h2 class="display-4">📖</h2>
                            <h4 class="card-title text-primary">本の取得</h4>
                            <p class="card-text text-muted">ISBN等で本を登録します</p>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <div class="mt-5 text-center text-muted">
            <small>※本は1人20冊まで管理可能です。</small>
        </div>
    </div>
</body>
</html>
