<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>書籍取得 - 蔵書管理システム</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- バーコードリーダー用ライブラリ -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        #reader { width: 100%; max-width: 500px; margin: 0 auto; border: none !important; }
        #reader__scan_region video { border-radius: 10px; }
    </style>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>📖 本の登録</h1>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">戻る</a>
    </div>

    <!-- メッセージ表示 -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-warning alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title mb-3">スキャンして入力</h5>
            <!-- カメラ表示エリア -->
            <div id="reader"></div>
            <div id="result"></div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form id="book-form" method="POST">
                <div class="mb-3">
                    <label class="form-label">利用者</label>
                    <select name="person_id" class="form-select" required>
                        <option value="">選択してください</option>
                        {% for p in persons %}
                        <option value="{{ p.id }}">{{ p.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">ISBN（バーコード読み取りで自動入力）</label>
                    <input type="text" id="isbn" name="isbn" class="form-control" placeholder="978...">
                </div>

                <div class="mb-3">
                    <label class="form-label">タイトル（直接入力も可）</label>
                    <input type="text" name="title" class="form-control" placeholder="タイトルが不明な場合はISBNのみでOK">
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2">この本を登録する</button>
            </form>
        </div>
    </div>
</div>
<script>
    // --- 1. バーコードスキャン成功時の処理 ---
    async function onScanSuccess(decodedText, decodedResult) {
        document.getElementById('isbn').value = decodedText;
        if (navigator.vibrate) navigator.vibrate(200);

        const resultArea = document.getElementById('result');
        resultArea.innerHTML = '<div class="spinner-border spinner-border-sm text-primary"></div> タイトルを検索中...';

        try {
            const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${decodedText}`);
            const data = await response.json();

            if (data.items && data.items.length > 0) {
                const title = data.items[0].volumeInfo.title;
                document.getElementsByName('title')[0].value = title;
                resultArea.innerHTML = `<div class="alert alert-success mt-2">ヒットしました！<br><strong>${title}</strong></div>`;
            } else {
                resultArea.innerHTML = `<div class="alert alert-warning mt-2">タイトルが見つかりませんでした。直接入力してください。</div>`;
            }
        } catch (error) {
            resultArea.innerHTML = `<div class="alert alert-danger mt-2">APIエラーが発生しました。</div>`;
        }
        html5QrcodeScanner.clear();
    }

    // --- 2. スキャナーの起動設定 ---
    let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", { fps: 10, qrbox: {width: 250, height: 150} }
    );
    html5QrcodeScanner.render(onScanSuccess);

    // --- 3. 【ここがバリデーション！】送信ボタンを押した時のチェック ---
    document.getElementById('book-form').onsubmit = function(e) {
        const isbn = document.getElementById('isbn').value;
        const title = document.getElementsByName('title')[0].value;
        const person = document.getElementsByName('person_id')[0].value;

        // 利用者の未選択チェック
        if (!person) {
            alert("利用者を選択してください。");
            e.preventDefault();
            return false;
        }

        // ISBNの桁数・数字チェック
        if (!/^\d{13}$/.test(isbn)) {
            alert("ISBNは13桁の数字で入力してください。");
            e.preventDefault(); // これで送信を止める
            return false;
        }

        // タイトルの未入力チェック
        if (!title) {
            alert("タイトルを入力（またはスキャン）してください。");
            e.preventDefault();
            return false;
        }

        // 全てOKならそのまま送信される
    };
</script>
</body>
</html>
