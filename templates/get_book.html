<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>本の取得 - 蔵書管理システム</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>📖 本の取得（登録）</h1>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">メニューへ戻る</a>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-warning shadow-sm">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card shadow-sm">
        <div class="card-body">
            <form method="POST">
                <!-- 誰が？ -->
                <div class="mb-4">
                    <label class="form-label font-weight-bold">1. 利用者を選択</label>
                    <select name="person_id" class="form-select form-select-lg" required>
                        <option value="" disabled selected>リストから選択してください</option>
                        {% for person in persons %}
                            <option value="{{ person.id }}">{{ person.name }} (ID:{{ person.id }})</option>
                        {% endfor %}
                    </select>
                </div>

                <hr>

                <!-- どの本を？ -->
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label font-weight-bold">2. ISBN番号で入力（推奨）</label>
                        <input type="text" name="isbn" class="form-control" placeholder="例: 9784041026489">
                        <small class="text-muted">※数字のみ入力してください。Googleから情報を取得します。</small>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label font-weight-bold">または 手書きで入力</label>
                        <input type="text" name="title" class="form-control" placeholder="ISBNがない場合はタイトルを入力">
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-success btn-lg w-100">この内容で図書カードに登録する</button>
                </div>
            </form>
        </div>
    </div>
    
    <div class="mt-4 text-center">
        <p class="small text-muted">※20冊を超えている利用者は登録時にエラーが表示されます。</p>
    </div>
</div>
</body>
</html>
