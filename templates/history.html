<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{{ person.name }}さんの図書カード - 蔵書管理システム</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>📑 {{ person.name }}さんの図書カード</h1>
        <div>
            <a href="{{ url_for('dispose_book', person_id=person.id) }}" class="btn btn-danger">本を廃棄する</a>
            <a href="{{ url_for('persons') }}" class="btn btn-secondary">利用者一覧へ</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title mb-3">利用履歴（取得・廃棄）</h5>
            <table class="table">
                <thead class="table-light">
                    <tr>
                        <th>日時</th>
                        <th>タイトル</th>
                        <th>ISBN</th>
                        <th>状態</th>
                    </tr>
                </thead>
                <tbody>
                    {% for log in logs %}
                    <tr>
                        <td>{{ log.timestamp }}</td>
                        <td><strong>{{ log.title }}</strong></td>
                        <td class="text-muted small">{{ log.isbn or '-' }}</td>
                        <td>
                            {% if log.status == '取得' %}
                                <span class="badge bg-primary">取得</span>
                            {% else %}
                                <span class="badge bg-danger">廃棄</span>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% if not logs %}
                <p class="text-center text-muted">まだ記録がありません。</p>
            {% endif %}
        </div>
    </div>
</div>
</body>
</html>
