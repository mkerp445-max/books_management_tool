<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>人の管理 - 蔵書管理システム</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>👥 人の管理</h1>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">メニューへ戻る</a>
    </div>

    <!-- 新規登録カード -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h5 class="card-title">新規登録（図書カードの発行）</h5>
            <form method="POST" class="row g-3">
                <div class="col-auto">
                    <input type="text" name="name" class="form-control" placeholder="お名前を入力" required>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">登録する</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 利用者一覧テーブル -->
    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title">利用者一覧</h5>
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>名前</th>
                        <th>登録日</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for person in persons %}
                    <tr>
                        <td>{{ person.id }}</td>
                        <td><strong>{{ person.name }}</strong></td>
                        <td>{{ person.created_at }}</td>
                        <td>
                            <a href="{{ url_for('history', person_id=person.id) }}" class="btn btn-sm btn-info text-white">図書カード</a>
                            <a href="{{ url_for('delete_person', id=person.id) }}" 
                               class="btn btn-sm btn-outline-danger" 
                               onclick="return confirm('この人を「不在」にしますか？（データは残ります）')">削除</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
